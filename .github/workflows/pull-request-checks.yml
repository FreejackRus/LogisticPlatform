name: Pull Request Checks

on:
  pull_request:
    branches:
      - main

jobs:
  freight-platform-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, curl, dom, fileinfo, gd, mbstring, pcntl, pdo_sqlite, sqlite3, xml, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Prepare environment
        run: |
          cp .env.example .env
          touch database/database.sqlite
          chmod -R 777 storage bootstrap/cache database

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Generate application key
        run: php artisan key:generate

      - name: Run dependency audits
        run: |
          composer audit --no-interaction
          npm audit --omit=dev

      - name: Build frontend assets
        run: npm run build

      - name: Run test suite
        run: php artisan test tests/Feature/FreightExchangeTest.php tests/Feature/Auth tests/Feature/ProfileTest.php tests/Unit/FreightServicesTest.php tests/Unit/GeocodingServiceTest.php
